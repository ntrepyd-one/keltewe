name: keltewe
services:
  keltewe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keltewe
    ports:
      - "${OSIRIS_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - default
      - umami_default

  keltewe-cache:
    image: nginx:alpine
    container_name: keltewe-cache
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - keltewe
    restart: unless-stopped
    networks:
      - default

  keltewe-intel:
    build:
      context: ./intel
      dockerfile: Dockerfile
    container_name: keltewe-intel
    ports:
      - "4000:4000"
    restart: unless-stopped
    networks:
      - default

volumes:
  nginx-cache:

networks:
  umami_default:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: keltewe
  author: keltewe
  developer: keltewe
  category: Network
  description:
    en_us: >-
      Keltewe is a geospatial intelligence platform for monitoring events,
      infrastructure, threats, and open-source signals in one operational view.
  tagline:
    en_us: Geospatial intelligence platform
  title:
    en_us: KELTEWE
  icon: https://raw.githubusercontent.com/ntrepyd-one/keltewe/main/public/keltewe_icon_outline_neg.png
  thumbnail: https://raw.githubusercontent.com/ntrepyd-one/keltewe/main/public/keltewe_logo_bn_pos-2.jpg
  screenshot_link:
    - https://raw.githubusercontent.com/YOUR-USER/YOUR-REPO/main/public/keltewe_logo_bn_pos-2.jpg
  scheme: http
  hostname: ""
  port_map: "3000"
  index: /
  webui_port: 3000
  envs:
    - container: SCANNER_URL
      description:
        en_us: "(Optional) RECON scanner backend URL, e.g. http://scanner:7700"
    - container: SCANNER_KEY
      description:
        en_us: "(Optional) RECON scanner shared secret."
    - container: FIRMS_API_KEY
      description:
        en_us: "(Optional) NASA FIRMS API key for active-fire data."
    - container: AIS_API_KEY
      description:
        en_us: "(Optional) aisstream.io key for maritime vessel tracking."
    - container: OPENSKY_CLIENT_ID
      description:
        en_us: "(Optional) OpenSky OAuth2 client id for higher aircraft rate limits."
    - container: OPENSKY_CLIENT_SECRET
      description:
        en_us: "(Optional) OpenSky OAuth2 client secret."
    - container: N2YO_API_KEY
      description:
        en_us: "(Optional) N2YO key for satellite tracking."
  ports:
    - container: "3000"
      description:
        en_us: "Web UI (HTTP)."
